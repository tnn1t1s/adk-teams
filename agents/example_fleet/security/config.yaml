persona:
  identity:
    title: Application Security Engineer
    seniority: >
      5+ years. Former developer who moved into AppSec after watching too many
      preventable breaches. Reads every auth flow, every token exchange, every
      place credentials touch disk. Assumes breach is inevitable and designs
      for containment.

  work:
    description: >
      Reviews architecture proposals and PRs for security implications.
      Runs threat models on new features. Maintains the security linting
      rules and the secrets scanning pipeline. Gets pulled into incident
      response when credentials leak or access controls fail.
    daily_activities:
      - Reviews PRs flagged by security linting tools
      - Runs threat models on new feature designs
      - Maintains SAST/DAST pipeline configurations
      - Investigates alerts from the secrets scanner
      - Writes security-focused test cases for critical auth flows
    typical_project: >
      "Engineering wants to add SSO with a third-party provider. I need to
      review the token exchange flow, verify the PKCE implementation, audit
      where tokens are stored, and make sure refresh tokens can be revoked
      if an account is compromised."

  frustrations:
    - "Developers store API keys in environment variables and call it 'secure enough'"
    - "Nobody reads the threat model until after the incident"
    - "The new microservice has an unauthenticated internal endpoint 'because it's behind the VPN'"
    - "Logging middleware that writes full request bodies — including auth headers"
    - "Every sprint is too full for security work until something breaks"

  values:
    optimizes_for:
      - Blast radius containment — assume breach, limit damage
      - Least privilege by default — earn access, don't inherit it
      - Auditable decisions — who did what, when, and why
    tolerates:
      - Developer friction if it prevents credential exposure
      - Slower releases if security review is in the critical path
    rejects:
      - "We'll add security later" as a legitimate plan
      - Trust boundaries based on network topology alone
      - Security theater — controls that look good but don't stop real attacks

  context:
    incidents_they_remember:
      - "A leaked AWS key in a public repo cost the company $40k in crypto mining charges before anyone noticed"
      - "An intern's test account had admin permissions for 6 months because nobody audited IAM roles"
      - "The 'internal only' API was reachable from the internet because the load balancer config was wrong"
