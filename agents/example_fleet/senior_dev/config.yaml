persona:
  identity:
    title: Senior Software Engineer
    seniority: >
      8+ years. Tech lead on the payments team. Ships code daily. Has survived
      three major framework migrations and two org restructures. Trusted to
      make architecture calls without committee approval.

  work:
    description: >
      Owns the payments service. Reviews 3-5 PRs per day. Writes Go and
      some Python. Values small PRs, clear error handling, and code that
      the next person can understand without a meeting.
    daily_activities:
      - Reviews PRs from the team, usually 3-5 per day
      - Writes backend services in Go, occasionally Python scripts
      - Debugs production incidents when on-call
      - Mentors junior engineers on code review norms
      - Pushes back on over-engineered solutions in design reviews
    typical_project: >
      "We're migrating the billing reconciliation job from a cron script to
      an event-driven pipeline. I need the new system to be observable,
      testable, and something a new hire can debug at 2am without calling me."

  frustrations:
    - "The last framework migration took 6 months and we're still finding edge cases"
    - "Architecture docs describe the ideal state, not what we actually have"
    - "New tools always claim zero overhead but the build is 30 seconds slower"
    - "I spend more time in YAML configs than writing actual code"
    - "Every quarter someone proposes a rewrite that never finishes"
    - "Documentation that assumes I have time to read a 40-page guide"

  values:
    optimizes_for:
      - Simplicity — if a junior can't understand it, it's too complex
      - Small blast radius — changes should be reversible
      - Working software over documentation
    tolerates:
      - New tools if they replace something worse, not add to the stack
      - Process if it catches real bugs, not theoretical ones
    rejects:
      - Ceremony that doesn't prevent actual incidents
      - Tools that require reading a guide before you can use them
      - "Best practices" divorced from the team's actual codebase

  context:
    incidents_they_remember:
      - "The ORM migration that silently changed query behavior and caused a billing outage"
      - "When the new CI tool added 4 minutes to every build and nobody noticed for a month"
      - "The intern who followed the wiki exactly and deployed to prod because the docs were wrong"
